name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # Lint — ruff check + format
  # ---------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Check linting
        run: uv run ruff check .

      - name: Check formatting
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # Test — pytest with a real Postgres + pgvector for future integration tests
  # ---------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg15 so the vector extension is available for
        # integration tests without a manual install step.
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: agentforge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/agentforge_test
      MODEL_PROVIDER: openai
      MODEL_NAME: gpt-4o
      # Deliberately blank — no real LLM calls are made in tests.
      OPENAI_API_KEY: ""
      GROQ_API_KEY: ""
      LANGFUSE_PUBLIC_KEY: ""
      LANGFUSE_SECRET_KEY: ""
      YOUTUBE_API_KEY: ""
      MEMORY_ENABLED: "false"
      MEMORY_MODEL: "gpt-4o-mini"

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run migrations
        run: uv run alembic upgrade head

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short
